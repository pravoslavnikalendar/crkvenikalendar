<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Црквени Календар</title>
    <style>
        body {

            /* Čuvamo tvoju magičnu grešku "backroung" */

            font-weight: bold;

.gornja-traka{
display:flex;
justify-content:flex-end;
margin-bottom:10px;
}

 padding: 5px 9px;;
font-size:15px;
border-radius:8px;

background: rgba(242, 230, 201, 0.9);
color:#4A3728;
	right:19px;

</head>
<body>

<a href="index.html" class="home-dugme">🏠</a>


<div class="gornja-traka">
    <!-- 1. Бирање године -->
    <select id="godinaBirac" class="meseci" onchange="osveziKalendar()">
        <option value="2025">2025</option>
        <option value="2026" selected>2026</option>
        <option value="2027">2027</option>
        <option value="2028">2028</option>
        <option value="2029">2029</option>
        <option value="2030">2030</option>
    </select>

    <!-- 2. Бирање месеца (Паметни мени који иде на Кalendar.html) -->
    <select id="mesecBirac" class="meseci" onchange="osveziKalendar()">
        <option value="">Mесец</option>
        <option value="0">Јануар</option>
        <option value="1">Фебруар</option>
        <option value="2">Март</option>
        <option value="3">Април</option>
        <option value="4">Мај</option>
        <option value="5">Јун</option>
        <option value="6">Јул</option>
        <option value="7">Август</option>
        <option value="8">Септембар</option>
        <option value="9">Октобар</option>
        <option value="10">Новембар</option>
        <option value="11">Децембар</option>
    </select>
</div>
    
<div class="container">
    <h2 id="naslovMeseca">Учитавам...</h2>
    <div id="kalendarTabela"></div>
<div id="dodatakPrikaz" style="display:none; margin: 20px auto; padding: 15px; 
background: rgba(242, 230, 201, 0.9); border: 1px solid #8b6f47; 
border-radius: 10px; font-style: italic; width: 80%; max-width: 400px; 
box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
</div> 
    <br>
 <button onclick="prikaziVaskrs()" style="background: #8b0000; color: white; padding: 15px 25px; 
border-radius: 10px; border: none; font-size: 20px; font-weight: bold; cursor: pointer; 
box-shadow: 0 4px 10px rgba(0,0,0,0.3);">🥚 Када је Васкрс?</button>   

<br><br>
<a href="index.html" style="text-decoration:none; font-size: 26px;
 color:#8b6f47; padding: 15px 30px; font-weight:bold;">⬅ Назад на почетну</a>
</div>

	
	<script>
	
	function osveziKalendar() {
    // 1. Узимамо вредности које је корисник изабрао у прозорчићима
    const g = document.getElementById('godinaBirac').value;
    const m = document.getElementById('mesecBirac').value;

    // 2. Ако је изабран и месец, цртамо табелу за тај месец и годину
    if (m !== "") {
        generisiKalendar(parseInt(m), parseInt(g));
        // Склањамо приказ Васкрса док корисник опет не кликне на дугме
        document.getElementById('dodatakPrikaz').style.display = "none";
    }
}

// Ова функција ће израчунати Васкрс за годину која је ТРЕНУТНО изабрана у селектору
function prikaziVaskrs() {
    const g = document.getElementById('godinaBirac').value;
    const datum = izracunajVaskrs(parseInt(g));
    
    const prikaz = document.getElementById('dodatakPrikaz');
    prikaz.style.display = "block";
    prikaz.innerHTML = "<b>Васкрс " + g + ". године пада:</b><br><span style='color:#8b0000; font-size:24px;'>" + datum + "</span>";
}

<script>
    // POPRAVLJENA MAGIJA: Sada čita i mesec i godinu iz linka
    const params = new URLSearchParams(window.location.search);
    let izabraniMesec = params.get('mesec');
    let izabranaGodina = params.get('godina'); // OVO JE NOVO!

    let danas = new Date();
    
    // Ako nema ništa u linku, uzmi današnji mesec i godinu
    let m = (izabraniMesec !== null) ? parseInt(izabraniMesec) : danas.getMonth();
    let g = (izabranaGodina !== null) ? parseInt(izabranaGodina) : danas.getFullYear();

    function generisiKalendar(mesec, godina) {
        const imena = ["Јануар", "Фебруар", "Март", "Април", "Mај", "Jун", "Jул", "Aвгуст", "Септембар", "Октобар", "Новембар", "Децембар"];
        document.getElementById('naslovMeseca').innerText = `${imena[mesec]} ${godina}.`;

        let prviDan = new Date(godina, mesec, 1).getDay();
        if (prviDan === 0) prviDan = 7; 

        let brojDana = new Date(godina, mesec + 1, 0).getDate();
        let html = "<table><tr><th>П</th><th>У</th><th>С</th><th>Ч</th><th>П</th><th>С</th><th class='nedelja'>Н</th></tr><tr>";

        for (let i = 1; i < prviDan; i++) {
            html += "<td></td>";
        }

        for (let dan = 1; dan <= brojDana; dan++) {
            let trenutniDatum = new Date(godina, mesec, dan);
            let klasa = "";
            
            if (trenutniDatum.getDay() === 0) klasa = "class='nedelja'";
            if (trenutniDatum.toDateString() === danas.toDateString()) klasa = "class='danasnji'";

            html += `<td ${klasa}>${dan}</td>`;

            if (trenutniDatum.getDay() === 0) {
                html += "</tr><tr>";
            }
        }

        html += "</table>";
        document.getElementById('kalendarTabela').innerHTML = html;
    }

    // Pokrećemo crtanje sa ispravnim podacima
    generisiKalendar(m, g);
// ПАМЕТНА ФУНКЦИЈА ЗА ВАСКРС (Православни)
function izracunajVaskrs(godina) {
    const a = godina % 19;
    const b = godina % 4;
    const c = godina % 7;
    const d = (19 * a + 15) % 30;
    const e = (2 * b + 4 * c + 6 * d + 6) % 7;
    const f = d + e;
    
    // Васкрс по старом календару (Јулијанском)
    let dan, mesec;
    if (f <= 9) {
        dan = 22 + f;
        mesec = "Март";
    } else {
        dan = f - 9;
        mesec = "Април";
    }
    
    // Додајемо 13 дана за нови календар
    let vaskrsNovi = new Date(godina, (mesec === "Март" ? 2 : 3), dan);
    vaskrsNovi.setDate(vaskrsNovi.getDate() + 13);
    
    const opcije = { day: 'numeric', month: 'long' };
    return vaskrsNovi.toLocaleDateString('sr-RS', opcije);
}

// Функција која приказује Васкрс кад кликнеш на дугме
function prikaziVaskrs() {
    const params = new URLSearchParams(window.location.search);
    const g = parseInt(params.get('godina')) || 2026;
    const datum = izracunajVaskrs(g);
    
    // Ово исписује одговор на онај твој папир:
    const prikaz = document.getElementById('dodatakPrikaz');
    prikaz.style.display = "block";
    prikaz.innerHTML = "<b>Васкрс " + g + ". године пада:</b><br><span style='color:#8b0000; font-size:24px;'>" + datum + "</span>";
}
      
</script>
	<script>
function osveziKalendar() {
    // 1. "Хватамо" шта је плавуша изабрала у менију на насловној
    var g = document.getElementById("godinaBirac").value;
    var m = document.getElementById("mesecBirac").value;

    // 2. Ако је изабран месец, ова линија те "испаљује" на страницу календара
    if (m !== "") {
        window.location.href = "kalendar.html?mesec=" + m + "&godina=" + g;
    }
}
</script>       

	
</body>
</html>
