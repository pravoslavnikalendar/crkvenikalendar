<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Црквени Календар 2025-2030</title>
    <style>
        body {
            margin: 0;
            background-image: url("papir.jpg");
            background-size: cover;
            background-attachment: fixed;
            font-family: "Times New Roman", Georgia, serif;
            color: #4A3728;
            text-align: center;
        }
        .container {
            width: 95%;
            max-width: 500px;
            margin: auto;
            padding: 20px;
            padding-top: 60px;
        }
        .gornja-traka {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .meseci {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #8b6f47;
            background: rgba(242, 230, 201, 0.9);
            font-size: 16px;
            color: #4A3728;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(242, 230, 201, 0.7);
            border: 1px solid #8b6f47;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        th, td {
            padding: 12px 5px;
            border: 1px solid rgba(139, 111, 71, 0.3);
            font-size: 18px;
        }
        th { background: rgba(139, 111, 71, 0.2); }
        .nedelja { color: #8b0000; font-weight: bold; }
        .danasnji { 
            background: rgba(139, 111, 71, 0.4); 
            border: 2px solid #8b0000 !important;
            font-weight: bold;
        }
        .home-dugme {
            position: fixed; top: 15px; left: 15px;
            background: rgba(242, 230, 201, 0.9);
            padding: 10px 15px; border-radius: 8px;
            border: 1px solid #8b6f47; text-decoration: none; color: #4A3728;
            font-size: 20px; z-index: 100;
        }
    </style>
</head>
<body>

<a href="index.html" class="home-dugme">🏠</a>

<div class="container">
    <div class="gornja-traka">
        <select id="godinaBirac" class="meseci" onchange="osveziKalendar()">
            <option value="2025">2025</option>
            <option value="2026" selected>2026</option>
            <option value="2027">2027</option>
            <option value="2028">2028</option>
            <option value="2029">2029</option>
            <option value="2030">2030</option>
        </select>

        <select id="mesecBirac" class="meseci" onchange="osveziKalendar()">
            <option value="0">Јануар</option><option value="1">Фебруар</option>
            <option value="2">Март</option><option value="3" selected>Април</option>
            <option value="4">Мај</option><option value="5">Јун</option>
            <option value="6">Јул</option><option value="7">Август</option>
            <option value="8">Септембар</option><option value="9">Октобар</option>
            <option value="10">Новембар</option><option value="11">Децембар</option>
        </select>
    </div>

    <h2 id="naslovMeseca">Април 2026.</h2>
    <div id="kalendarTabela"></div>

    <div id="dodatakPrikaz" style="display:none; margin: 20px auto; padding: 15px; background: rgba(242, 230, 201, 0.9); border: 1px solid #8b6f47; border-radius: 10px; font-style: italic; width: 85%; box-shadow: 0 4px 10px rgba(0,0,0,0.2);"></div>

    <br>
    <button onclick="prikaziVaskrs()" style="background: #8b0000; color: white; padding: 15px 25px; border-radius: 10px; border: none; font-size: 18px; font-weight: bold; cursor: pointer;">🥚 Када је Васкрс?</button>   

    <br><br>
    <a href="index.html" style="text-decoration:none; font-size: 20px; color:#8b6f47; font-weight:bold;">⬅ Назад на почетну</a>
</div>

<script>
    function generisiKalendar(mesec, godina) {
        const imena = ["Јануар", "Фебруар", "Март", "Април", "Mај", "Jун", "Jул", "Aвгуст", "Септембар", "Октобар", "Новембар", "Децембар"];
        document.getElementById('naslovMeseca').innerText = imena[mesec] + " " + godina + ".";

        let danas = new Date();
        let prviDan = new Date(godina, mesec, 1).getDay();
        if (prviDan === 0) prviDan = 7; 

        let brojDana = new Date(godina, mesec + 1, 0).getDate();
        let html = "<table><tr><th>П</th><th>У</th><th>С</th><th>Ч</th><th>П</th><th>С</th><th class='nedelja'>Н</th></tr><tr>";

        for (let i = 1; i < prviDan; i++) {
            html += "<td></td>";
        }

        for (let dan = 1; dan <= brojDana; dan++) {
            let trenutniDatum = new Date(godina, mesec, dan);
            let klasa = "";
            if (trenutniDatum.getDay() === 0) klasa = "class='nedelja'";
            if (trenutniDatum.toDateString() === danas.toDateString()) klasa = "class='danasnji'";

            html += "<td " + klasa + ">" + dan + "</td>";
            if (trenutniDatum.getDay() === 0) html += "</tr><tr>";
        }
        html += "</table>";
        document.getElementById('kalendarTabela').innerHTML = html;
    }

    function osveziKalendar() {
        const m = document.getElementById('mesecBirac').value;
        const g = document.getElementById('godinaBirac').value;
        generisiKalendar(parseInt(m), parseInt(g));
        document.getElementById('dodatakPrikaz').style.display = "none";
    }

    function izracunajVaskrs(godina) {
        const a = godina % 19, b = godina % 4, c = godina % 7;
        const d = (19 * a + 15) % 30, e = (2 * b + 4 * c + 6 * d + 6) % 7;
        const f = d + e;
        let vD, vM;
        if (f <= 9) { vD = 22 + f; vM = 2; } else { vD = f - 9; vM = 3; }
        let vaskrsNovi = new Date(godina, vM, vD);
        vaskrsNovi.setDate(vaskrsNovi.getDate() + 13);
        return vaskrsNovi.toLocaleDateString('sr-RS', { day: 'numeric', month: 'long' });
    }

    function prikaziVaskrs() {
        const g = document.getElementById('godinaBirac').value;
        const datum = izracunajVaskrs(parseInt(g));
        const prikaz = document.getElementById('dodatakPrikaz');
        prikaz.style.display = "block";
        prikaz.innerHTML = "<b>Васкрс " + g + ". године пада:</b><br><span style='color:#8b0000; font-size:24px;'>" + datum + "</span>";
    }

    // Иницијално цртање за април 2026.
    generisiKalendar(3, 2026);

</script>

<script>
function generisiKalendar(mesec, godina) {
    const imena = ["Јануар", "Фебруар", "Март", "Април", "Mај", "Jун", "Jул", "Aвгуст", "Септембар", "Октобар", "Новембар", "Децембар"];
    document.getElementById('naslovMeseca').innerText = imena[mesec] + " " + godina + ".";

    let danas = new Date();
    let prviDan = new Date(godina, mesec, 1).getDay();
    if (prviDan === 0) prviDan = 7; 

    let brojDana = new Date(godina, mesec + 1, 0).getDate();
    
    // ОВО ЈЕ НОВО: Рачунамо Васкрс за ту годину да бисмо га обојили у табели
    let vaskrsDatum = izracunajVaskrsObjekat(godina);

    let html = "<table><tr><th>П</th><th>У</th><th>С</th><th>Ч</th><th>П</th><th>С</th><th class='nedelja'>Н</th></tr><tr>";

    for (let i = 1; i < prviDan; i++) {
        html += "<td></td>";
    }

    for (let dan = 1; dan <= brojDana; dan++) {
        let trenutniDatum = new Date(godina, mesec, dan);
        let klasa = "";
        
        // 1. Ако је недеља
        if (trenutniDatum.getDay() === 0) klasa = "class='nedelja'";
        
        // 2. Ако је ДАНАС (8. април 2026)
        if (trenutniDatum.toDateString() === danas.toDateString()) klasa = "class='danasnji'";

        // 3. НОВО: Ако је ВАСКРС (Бојимо га посебно)
        if (trenutniDatum.toDateString() === vaskrsDatum.toDateString()) {
            klasa = "style='background: #8b0000; color: white; border-radius: 50%; font-weight: bold;'";
        }

        html += "<td " + klasa + ">" + dan + "</td>";
        if (trenutniDatum.getDay() === 0) html += "</tr><tr>";
    }
    html += "</table>";
    document.getElementById('kalendarTabela').innerHTML = html;
}

// Помоћна функција која претвара Васкрс у датум који скрипта разуме
function izracunajVaskrsObjekat(godina) {
    const a = godina % 19, d = (19 * (godina % 19) + 15) % 30, e = (2 * (godina % 4) + 4 * (godina % 7) + 6 * d + 6) % 7;
    const f = d + e;
    let vD, vM;
    if (f <= 9) { vD = 22 + f; vM = 2; } else { vD = f - 9; vM = 3; }
    let v = new Date(godina, vM, vD);
    v.setDate(v.getDate() + 13);
    return v;
}
</script>    
</body>
</html>
