<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Значајни празници 2026</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #d3d3d3 0%, #e6e6fa 100%);
            background-image: url("papir.png");
            background-size: cover;
            background-attachment: fixed;
            font-family: "Times New Roman", serif;
            text-align: center;
            color: #4A3728;
        }
        .container { padding-top: 60px; width: 90%; max-width: 500px; margin: auto; }

/* 1. OVO JE KOMANDA KOJA "OTKLJUČAVA" VELIČINU SLOVA NA TELEFONU */
html {
    -webkit-text-size-adjust: 100%;
    -ms-text-size-adjust: 100%;
    text-size-adjust: 100%;
}

        
#lista-praznika .pouka-box {
    width: 100% !important; 
    margin: 20px auto !important;
    padding: 15px !important;
    display: block !important;
    box-sizing: border-box !important;
}

#lista-praznika .pouka-box span, 
#lista-praznika .pouka-box b {
    font-size: 40px !important; /* KRUPNI SVETITELJI */
    color: #dd1616 !important; /* TVOJA CRVENA BOJA */
    text-decoration: none !important; /* BRIŠE PLAVU LINIJU */
}

#lista-praznika .pouka-box p {
    font-size: 19px !important; /* KRUPNA ŽITIJA */
    color: #4A3728 !important; /* TVOJA BRAON BOJA */
    text-decoration: none !important;
}
#danas-kutija {
    background: rgba(255, 255, 255, 0.2); /* Prozirno bela kao magla */
    backdrop-filter: blur(10px);         /* Zamućuje papir ispod - pravi efekat stakla */
    border: 1px solid rgba(255, 255, 255, 0.3); /* Tanki prozirni "stakleni" rub */
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15); /* Blaga senka za dubinu */
    margin: 20px auto;
    width: 90%;
    max-width: 400px;
}

#danasnja-slika {
    border-radius: 50%; /* Pravi savršen krug od slike */
    border: 3px solid rgba(128, 128, 128, 0.3); /* Prozirno sivi okvir oko ikone */
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
}
        
        .pouka-box {
            background: rgba(242, 230, 201, 0.85);
            padding: 50px;
            border-radius: 15px;
            border: 2px solid #8b6f47;
            margin-bottom: 20px;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .crveno { color: #dd1616; font-weight: bold; font-size: 22px; }
        .obicno { color: #4A3728; font-weight: bold; font-size: 20px; }

        .home-dugme {
            position: fixed; top: 15px; left: 15px;
            background: rgba(242, 230, 201, 0.9);
            padding: 10px 15px; border-radius: 8px;
            border: 1px solid #2E1B08; text-decoration: none; color: #2E1B08;
            font-size: 20px; z-index: 1000;
        }

.pouka-box p {
    max-height: 150px; /* Ograničava visinu teksta */
    overflow-y: auto;  /* Dodaje mali klizač ako je tekst predugačak */
    padding-right: 5px;
}

media (max-width: 600px) {
    .pouka-box {
        width: 100% !important; 
        padding: 20px 10px !important;
    }

    
   /* 2. TVOJ MEDIA DEO GDE SI STAVILA 40px ILI 60px */
@media (max-width: 600px) {
    .pouka-box span, .pouka-box b {
        font-size: 35px !important; /* Probaj prvo 35px, to je već ogromno */
    }
    .pouka-box p {
        font-size: 22px !important;
    }
}
    </style>
</head>
<body>

<a href="index.html" class="home-dugme">🏠</a>

    
   

<div class="container">
    <h1 style="letter-spacing: 2px;">☦️ ПРАЗНИЦИ 2026.</h1>
  
    <div id="lista-praznika">
        <!-- Ovde skripta sama ubacuje podatke -->
    </div>
</div>
    
<p style="margin-top: 10px; font-style: italic; font-size: 19px;">
    ${p.pouka ? `
        <span class="skraceni-tekst">${p.pouka.substring(0, 100)}...</span>
        <span class="ceo-tekst" style="display: none;">${p.pouka}</span>
        <button onclick="prikaziVise(this)" style="background: none; border: none; color: #8b6f47; font-weight: bold; cursor: pointer; font-size: 17px; padding: 0;"> Прочитај више</button>
    ` : ""}
</p>


    <div id="danas-kutija">
    <h3 id="svetitelj-tekst"></h3>
    <img id="danasnja-slika" src="" style="display:none; width:150px; margin:auto;">
    <p id="danasnja-pouka" style="font-style:italic;"></p>
</div>

</script>

<script>
function prikaziVise(dugme) {
    let boks = dugme.parentElement;
    let skraceno = boks.querySelector('.skraceni-tekst');
    let celo = boks.querySelector('.ceo-tekst');
    
    if (celo.style.display === "none") {
        celo.style.display = "inline";
        skraceno.style.display = "none";
        dugme.innerText = " Скрати";
    } else {
        celo.style.display = "none";
        skraceno.style.display = "inline";
        dugme.innerText = " Прочитај више";
    }
}
</script>
    
<script>
    fetch('svetitelji.json')
    .then(response => response.json())
    .then(data => {
        let kontejner = document.getElementById('lista-praznika');
        kontejner.innerHTML = ""; // Briše poruku o učitavanju

        for (let kljuc in data) {
            let p = data[kljuc];
            let klasa = (p.boja === "red") ? "crveno" : "";
            
            kontejner.innerHTML += `
                <div class="pouka-box" style="text-align: left;">
                    <span class="${klasa}" style="font-size: 20px;">${kljuc}</span> - 
                    <span class="${klasa}" style="font-size: 20px; font-weight: bold;">${p.praznik}</span>
                    ${p.pouka ? `<p style="margin-top: 10px; font-style: italic;">${p.pouka}</p>` : ""}
                   
                    ${p.slika ? `<img src="${p.slika}" style="width: 130px; height: auto; display: block; margin: 15px auto; 
                    border-radius: 10px; box-shadow: 0 0 15px rgba(212, 175, 55, 0.8); border: 1px solid rgba(212, 175, 55, 0.4);">` : ""}
                </div>
            `;
        }
    })
    .catch(err => {
        console.error("Greska:", err);
        document.getElementById('lista-praznika').innerHTML = "Problem sa učitavanjem praznika.";
    });
</script>

    
    kontejner.innerHTML += `
                <div class="pouka-box" style="text-align: center; margin-bottom: 30px;">
                    <div style="margin-bottom: 10px;">
                        <span class="${klasa}" style="font-size: 22px;">${kljuc}</span> - 
                        <span class="${klasa}" style="font-size: 22px; font-weight: bold;">${p.praznik}</span>
                    </div>

                    ${p.slika ? `
                        <a href="${p.link ? p.link : '#'}">
                            <img src="${p.slika}" style="width: 180px; height: auto; display: block; margin: 15px auto; 
                            border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 2px solid #8b6f47; cursor: pointer;" 
                            title="Кликни за житије">
                        </a>` : ""}
                    
                    ${p.link ? `
                        <a href="${p.link}" style="display: inline-block; margin-top: 10px; color: #8b0000; 
                        text-decoration: none; font-weight: bold; font-size: 18px; border-bottom: 1px solid #8b0000;">
                           📖 Прочитај житије
                        </a>` : ""}
                </div>
            `;
</body>
</html>
