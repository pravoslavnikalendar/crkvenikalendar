<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Значајни празници 2026</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #d3d3d3 0%, #e6e6fa 100%);
            background-image: url("papir.png");
            background-size: cover;
            background-attachment: fixed;
            font-family: "Times New Roman", serif;
            text-align: center;
            color: #4A3728;
        }
        .container { padding-top: 60px; width: 90%; max-width: 500px; margin: auto; }
        
        .pouka-box {
            background: rgba(242, 230, 201, 0.85);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #8b6f47;
            margin-bottom: 20px;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .crveno { color: #dd1616; font-weight: bold; font-size: 22px; }
        .obicno { color: #4A3728; font-weight: bold; font-size: 20px; }

        .home-dugme {
            position: fixed; top: 15px; left: 15px;
            background: rgba(242, 230, 201, 0.9);
            padding: 10px 15px; border-radius: 8px;
            border: 1px solid #2E1B08; text-decoration: none; color: #2E1B08;
            font-size: 20px; z-index: 1000;
        }

.pouka-box p {
    max-height: 150px; /* Ograničava visinu teksta */
    overflow-y: auto;  /* Dodaje mali klizač ako je tekst predugačak */
    padding-right: 5px;
}

@media (max-width: 600px) {
    .pouka-box {
        width: 92%;           /* Širi boks da skoro dodiruje ivice ekrana */
        margin: 20px auto;    /* Veći razmak između dva praznika */
        padding: 25px 15px;   /* Više unutrašnjeg prostora (da tekst ne guši ivice) */
        border-width: 3px;    /* Malo deblja ivica da se bolje vidi na papiru */
        min-height: 150px;    /* Osigurava da boks uvek ima lepu visinu */
    }

    .pouka-box img {
        width: 140px !important; /* Povećavamo i ikonu pošto je boks sada veći */
        margin-bottom: 15px;
    }

        

    .pouka-box span, .pouka-box b {
        font-size: 24px; /* Malo prilagođeno za mali ekran */
    }
}  
    </style>
</head>
<body>

<a href="index.html" class="home-dugme">🏠</a>

    
   

<div class="container">
    <h1 style="letter-spacing: 2px;">☦️ ПРАЗНИЦИ 2026.</h1>
    <a href="praznici.html" class="dugme praznici-dugme">
    <div id="lista-praznika">
        <!-- Ovde skripta sama ubacuje podatke -->
    </div>
</div>
    



    <div id="danas-kutija">
    <h3 id="svetitelj-tekst"></h3>
    <img id="danasnja-slika" src="" style="display:none; width:150px; margin:auto;">
    <p id="danasnja-pouka" style="font-style:italic;"></p>
</div>

</script>

<script>
    fetch('svetitelji.json')
    .then(response => response.json())
    .then(data => {
        let kontejner = document.getElementById('lista-praznika');
        kontejner.innerHTML = ""; // Briše poruku o učitavanju

        for (let kljuc in data) {
            let p = data[kljuc];
            let klasa = (p.boja === "red") ? "crveno" : "";
            
            kontejner.innerHTML += `
                <div class="pouka-box" style="text-align: left;">
                    <span class="${klasa}" style="font-size: 20px;">${kljuc}</span> - 
                    <span class="${klasa}" style="font-size: 20px; font-weight: bold;">${p.praznik}</span>
                    ${p.pouka ? `<p style="margin-top: 10px; font-style: italic;">${p.pouka}</p>` : ""}
                   
                    ${p.slika ? `<img src="${p.slika}" style="width: 130px; height: auto; display: block; margin: 15px auto; 
                    border-radius: 10px; box-shadow: 0 0 15px rgba(212, 175, 55, 0.8); border: 1px solid rgba(212, 175, 55, 0.4);">` : ""}
                </div>
            `;
        }
    })
    .catch(err => {
        console.error("Greska:", err);
        document.getElementById('lista-praznika').innerHTML = "Problem sa učitavanjem praznika.";
    });
</script>
    
</body>
</html>
