<script>
async function prikaziSve() {
    const d = new Date();
    // 1. Враћамо суботу на екран
    const opcije = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
    document.getElementById('datum').innerText = d.toLocaleDateString('sr-RS', opcije);

    // 2. Тражимо свеца у твом фајлу
    try {
        const res = await fetch('svetitelji.json');
        const svetitelji = await res.json();
        const kljuc = `${d.getDate()}-${d.getMonth() + 1}`;
        
        if (svetitelji[kljuc]) {
            document.getElementById('svetitelj').innerHTML = "<b>Данас славимо:</b><br>" + svetitelji[kljuc];
        } else {
            document.getElementById('svetitelj').innerText = "Свети Поликарп Смирнски";
        }
    } catch (e) {
        document.getElementById('svetitelj').innerText = "Данас: Свети Поликарп Смирнски";
    }
function osveziKalendar() {
    let m = document.getElementById('mesecBirac').value;
    let g = document.getElementById('godinaBirac').value;
    if(m !== "") {
        // Šalje obe informacije na onaj tvoj "most"
        window.location.href = `kalendar.html?mesec=${m}&godina=${g}`;
    }
}
prikaziSve();
</script>
