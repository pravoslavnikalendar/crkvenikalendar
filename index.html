.blog-pecat {

    color: #2E1B08;           
    font-weight: bold;
    font-size: 14px;
    z-index: 99999;           
    box-shadow: -2px 4px 10px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.stiker-dugme {
    position: fixed;
    bottom: 30px;      /* Стаклићемо га у доњи угао да не смета тексту */
    right: 30px;       /* Твоја слободна десна страна на лаптопу */
    width: 80px;       /* Величина твог стикера */
    height: auto;
    cursor: pointer;
    z-index: 10001;    /* Да буде изнад папира */
    transition: 0.4s;
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3)); /* Сенка да "искочи" */

.stiker-dugme:hover {
    transform: scale(1.2) rotate(5deg); /* Да мало заплеше кад га дотакнеш */
