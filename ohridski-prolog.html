    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #d3d3d3 0%, #e6e6fa 100%);
            background-image: url("papir.png"); /* Tvoj papir */
            background-size: cover;
            background-attachment: fixed;
            font-family: "Times New Roman", serif;
            color: #4A3728;
            text-align: center;
        }
        .container { padding-top: 50px; width: 95%; max-width: 500px; margin: auto; }
        
        .uvod-box {
            background: rgba(242, 230, 201, 0.4); /* Tvoja bež sa providnošću */
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(139, 111, 71, 0.5);
            margin-bottom: 30px;
            font-style: italic;
        }
    
  /* SADRŽAJ (Katizme) */
        .sadrzaj {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Dve kolone dugmića */
            gap: 10px;
            margin-bottom: 40px;
            padding: 10px;
        }


        h1 { color: #8b0000; letter-spacing: 2px; text-transform: uppercase; }


/* Ово је невидљиви рам који држи дугмиће да лебде у колонама */
.meseci-mreza {
    display: flex;
    flex-wrap: wrap;       /* Ово дозвољава да пређу у нови ред */
    justify-content: center;
    gap: 15px;             /* Размак између лебдећих дугмића */
    max-width: 450px;      /* Таман за три колоне по 90-100px */
    margin: 20px auto;
    padding: 10px;
}

/* Мала исправка за само дугме (избаци 'margin: auto' и 'display: block') */
.mesec-dugme {
    display: inline-block; /* Да би могли да стоје један поред другог */
    background: rgba(242, 230, 201, 0.85);
    padding: 15px;
    width: 95px;           /* Мало смо их проширили да текст лепо стане */
    text-decoration: none;
    color: #8b0000;
    font-size: 18px;
    font-weight: bold;
    border-radius: 10px;
    border: 1px solid #8b6f47;
    box-shadow: inset 0 2px 6px rgba(255,255,255,0.25),
                inset 0 -2px 4px rgba(0,0,0,0.15),
                0 6px 12px rgba(0,0,0,0.25);
    transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
}







        /* TVOJI BEŽ DUGMIĆI */
        .mesec-dugme {
            display: block;
            background: rgba(242, 230, 201, 0.85); /* Tvoja boja */
            padding: 15px;
            margin: 10px auto;
            width: 85%;
            text-decoration: none;
            color: #8b0000; /* Bordo slova na bež podlozi */
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            border: 1px solid #8b6f47;
            box-shadow: inset 0 2px 6px rgba(255,255,255,0.25),
            inset 0 -2px 4px rgba(0,0,0,0.15),
            0 6px 12px rgba(0,0,0,0.25);
            transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
            width: 90px; 
        }


        .mesec-dugme:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: inset 0 3px 8px rgba(255,255,255,0.4),
            inset 0 -3px 6px rgba(0,0,0,0.2),
            0 10px 20px rgba(0,0,0,0.35);
            background: rgba(242, 230, 201, 0.95);
        }


.stiker-vladika {
    width: 160px; /* Ili veličina koja ti odgovara */
    border-radius: 15px; /* Blago zaobljene ivice, kao nalepnica */
    padding: 8px;
    background: white; /* Bela ivica stikera */
    box-shadow: 5px 5px 15px rgba(0,0,0,0.3); /* Senka koja daje dubinu */
    border: 1px solid #ddd; /* Tanki sivi okvir da se bela ivica ne stopi sa pozadinom */
    display: block;
    margin: 20px auto;
    transform: rotate(-3deg); /* Blago je "nakriviš" da izgleda kao da je zalepljena rukom */
    transition: 0.3s;
}

.stiker-vladika:hover {
    transform: rotate(0deg) scale(1.05); /* Ispravi se i poveća kad prođeš mišem */
}

.stiker-justin {
    width: 160px; /* Ili veličina koja ti odgovara */
    border-radius: 15px; /* Blago zaobljene ivice, kao nalepnica */
    padding: 8px;
    background: white; /* Bela ivica stikera */
    box-shadow: 5px 5px 15px rgba(0,0,0,0.3); /* Senka koja daje dubinu */
    border: 1px solid #ddd; /* Tanki sivi okvir da se bela ivica ne stopi sa pozadinom */
    display: block;
    margin: 20px auto;
    transform: rotate(-3deg); /* Blago je "nakriviš" da izgleda kao da je zalepljena rukom */
    transition: 0.3s;
}

.stiker-justin:hover {
    transform: rotate(0deg) scale(1.05); /* Ispravi se i poveća kad prođeš mišem */
}
