<body>

   <a href="molitvenik.html" class="molitvenik-dugme">🏠</a>

<div class="container">
    <h1 style="text-shadow: 1px 1px 2px white;"></h1>
    <p><i></i></p>

<h1>Аудио молитве</h1>



<div class="audio-sekcija" style="background: #f4f4f4; padding: 15px; border-radius: 10px; text-align: center;">
    <p><strong id="naslov-pesme" style="color: #333;">Izaberite molitvu</strong></p>
    
    <audio id="glavni-plejer" controls style="width: 100%; margin-bottom: 20px;"></audio>

    <div class="dugmad-lista" style="display: flex; flex-direction: column; gap: 10px;">
        <button onclick="pustiPesmu(0, 'Пресвета Богородице Спаси Нас', '127bSaYz8fA9XSLJVWi5l8xTaOgbqwHYl')" style="padding: 10px; cursor: pointer; background: #808080; color: white; border: none; border-radius: 5px;">1. Пресвета Богородице Спаси Нас</button>
        
        <button onclick="pustiPesmu(1, 'Душо моја свет се нагло мења', '1MpuIH1wNvBOJKgYnTb7JN9p96_xZYQBi')" style="padding: 10px; cursor: pointer; background: #808080; color: white; border: none; border-radius: 5px;">2. Душо моја свет се нагло мења</button>
    </div>
</div>

<script>
    const audio = document.getElementById('glavni-plejer');
    const naslov = document.getElementById('naslov-pesme');

    // Lista pesama za automatsko prebacivanje
    const pesme = [
        { naslov: "Пресвета Богородице Спаси Нас", id: "127bSaYz8fA9XSLJVWi5l8xTaOgbqwHYl" },
        { naslov: "Душо моја свет се нагло мења", id: "1MpuIH1wNvBOJKgYnTb7JN9p96_xZYQBi" }
    ];

    let trenutnaPesma = 0;

    function pustiPesmu(index, naziv, driveId) {
        trenutnaPesma = index;
        naslov.innerText = naziv;
        // Specijalni link koji Chrome na telefonu lakše čita:
        audio.src = "https://docs.google.com/uc?export=open&id=" + driveId;
        audio.play().catch(e => console.log("Kliknite Play da krene"));
    }

    // Kad se završi pesma, automatski kreni na sledeću
    audio.onended = function() {
        trenutnaPesma++;
        if (trenutnaPesma < pesme.length) {
            pustiPesmu(trenutnaPesma, pesme[trenutnaPesma].naslov, pesme[trenutnaPesma].id);
        }
    };
</script>
